<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: system-ui, sans-serif; width: 340px; padding: 12px; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  .actions { display: flex; gap: 8px; margin-bottom: 10px; }
  .actions button { flex: 1; padding: 7px; cursor: pointer; }
  .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .badge { color: #fff; font-size: 11px; font-weight: 700; letter-spacing: .5px;
           padding: 2px 8px; border-radius: 4px; }
  .host { font-size: 11px; color: #666; word-break: break-all; }
  textarea { width: 100%; height: 80px; box-sizing: border-box; font-family: monospace; font-size: 11px; }
  button { padding: 6px 10px; cursor: pointer; }
  .meta { font-size: 11px; color: #999; }
  .clear { width: 100%; margin-top: 2px; }
  .empty { color: #999; font-size: 12px; line-height: 1.5; }
  details { margin-top: 6px; font-size: 12px; }
  summary { cursor: pointer; font-weight: 600; }
  fieldset { border: 1px solid #e0e0e0; border-radius: 6px; margin: 8px 0; padding: 8px; }
  legend { font-size: 11px; font-weight: 700; color: #555; padding: 0 4px; }
  fieldset input { width: 100%; box-sizing: border-box; margin: 3px 0; padding: 5px; }
  .chk { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  #saveCreds { width: 100%; margin-top: 4px; }
  .warn { font-size: 10px; color: #b26a00; margin-top: 6px; line-height: 1.4; }
  .saved { font-size: 11px; color: #2e7d32; margin-left: 8px; }
  .credit { text-align: center; font-size: 10px; color: #bbb; margin-top: 12px; }
</style>
</head>
<body>
  <h1>AutoGrabber</h1>
  <div class="actions">
    <button id="fetchDev">Fetch DEV token</button>
    <button id="fetchStg">Fetch STG token</button>
  </div>
  <div id="content"></div>
  <details id="settings">
    <summary>Login settings</summary>
    <label class="chk"><input type="checkbox" id="autoLogin"> Enable background auto-login</label>
    <fieldset>
      <legend>DEV</legend>
      <input id="devUser" placeholder="username" autocomplete="off">
      <input id="devPass" type="password" placeholder="password" autocomplete="new-password">
    </fieldset>
    <fieldset>
      <legend>STG</legend>
      <input id="stgUser" placeholder="username" autocomplete="off">
      <input id="stgPass" type="password" placeholder="password" autocomplete="new-password">
    </fieldset>
    <button id="saveCreds">Save settings</button><span id="savedMsg" class="saved"></span>
    <div class="warn">Credentials are stored unencrypted in your browser profile. Use only your QA account and don't reuse this password elsewhere.</div>
  </details>
  <div class="credit">© thbakitas</div>
  <script src="popup.js"></script>
</body>
</html>
